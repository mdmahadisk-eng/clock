<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Dashboard · Digital Clock + Weather</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: linear-gradient(145deg, #e2f0fa 0%, #ddf2eb 50%, #f0f7fe 100%);
        }
        .container {
            max-width: 1050px;
            width: 100%;
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 30px 32px 25px;
            border: 1px solid rgba(255,255,255,0.9);
            box-shadow: 0 20px 60px rgba(15,23,42,0.06);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
            border-bottom: 1.5px solid rgba(15,23,42,0.05);
            padding-bottom: 14px;
        }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .header-left i { font-size: 1.8rem; color: #0d9488; }
        .header-left h1 { color: #0f172a; font-size: 1.5rem; font-weight: 700; }
        .header-left h1 span { color: #0d9488; }
        .header-right .badge {
            display: flex; align-items: center; gap: 8px;
            color: #94a3b8; font-size: 0.7rem; font-weight: 500;
            background: rgba(255,255,255,0.5);
            padding: 4px 16px; border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.8);
        }
        .badge .dot { width: 7px; height: 7px; background: #10b981; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 28px;
            align-items: stretch;
        }

        /* ===== CLOCK PANEL (Digital Only) ===== */
        .clock-panel {
            background: rgba(255,255,255,0.3);
            border-radius: 28px;
            padding: 30px 28px;
            border: 1px solid rgba(255,255,255,0.6);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            min-height: 200px;
        }

        .digital-time {
            display: flex;
            align-items: baseline;
            gap: 4px;
            font-weight: 700;
            color: #0f172a;
            flex-wrap: wrap;
        }
        .digital-time .t { font-size: 4.2rem; font-weight: 700; line-height: 1.1; }
        .digital-time .c { font-size: 4rem; color: #0d9488; animation: blink 1s infinite; margin: 0 4px; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
        .digital-time .sec { font-size: 2rem; font-weight: 300; color: #94a3b8; margin-left: 4px; }
        .digital-time .ampm { font-size: 1.8rem; font-weight: 600; color: #0d9488; margin-left: 8px; }

        .date-info { margin-top: 6px; }
        .date-info .day {
            font-size: 1rem;
            font-weight: 600;
            color: #0d9488;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .date-info .full-date {
            font-size: 1.1rem;
            font-weight: 500;
            color: #334155;
            background: rgba(255,255,255,0.3);
            padding: 2px 18px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.3);
            display: inline-block;
            margin-top: 2px;
        }
        .tz-info {
            margin-top: 8px;
            font-size: 0.8rem;
            color: #94a3b8;
            background: rgba(255,255,255,0.2);
            padding: 4px 18px;
            border-radius: 40px;
            display: inline-block;
        }

        /* ===== WEATHER PANEL ===== */
        .weather-panel {
            background: rgba(255,255,255,0.3);
            border-radius: 28px;
            padding: 20px 22px 22px;
            border: 1px solid rgba(255,255,255,0.6);
        }
        .ip-info {
            background: rgba(255,255,255,0.5);
            border-radius: 40px; padding: 6px 18px; margin-bottom: 12px;
            font-size: 0.75rem; font-weight: 500; color: #334155;
            border: 1px solid rgba(255,255,255,0.6);
            display: flex; flex-wrap: wrap; align-items: center; justify-content: center;
            gap: 4px 12px; text-align: center; min-height: 36px;
        }
        .ip-info i { color: #0d9488; margin-right: 4px; font-size: 0.7rem; }
        .ip-info .divider { color: rgba(15,23,42,0.08); }
        .ip-info .ip { font-family: monospace; font-weight: 600; color: #0f172a; background: rgba(255,255,255,0.3); padding: 0 8px; border-radius: 20px; }

        .search-box { display: flex; gap: 8px; margin-bottom: 14px; }
        .search-box input {
            flex: 1; background: rgba(255,255,255,0.7); border: 1px solid rgba(15,23,42,0.06);
            border-radius: 60px; padding: 10px 18px; font-family: 'Inter', sans-serif;
            font-size: 0.8rem; color: #0f172a; outline: none;
        }
        .search-box input:focus { border-color: #0d9488; box-shadow: 0 0 0 4px rgba(13,148,136,0.06); }
        .search-box button {
            background: #0d9488; border: none; color: white; padding: 0 20px;
            border-radius: 60px; font-size: 0.8rem; font-weight: 600; cursor: pointer;
            font-family: 'Inter', sans-serif; display: flex; align-items: center; gap: 6px;
            transition: 0.2s;
        }
        .search-box button:hover { background: #0f766e; transform: scale(1.02); }

        .weather-display { text-align: center; padding: 4px 0; }
        .weather-icon { font-size: 3.2rem; display: block; }
        .weather-temp { font-size: 2.8rem; font-weight: 700; color: #0f172a; }
        .weather-temp sup { font-size: 1.4rem; font-weight: 400; color: #64748b; }
        .weather-desc { font-size: 1rem; font-weight: 500; color: #334155; }
        .weather-location { font-size: 0.8rem; color: #64748b; }
        .weather-location i { color: #0d9488; margin-right: 4px; }

        .details-grid {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            gap: 8px; margin-top: 12px; padding-top: 12px;
            border-top: 1px solid rgba(15,23,42,0.04);
        }
        .detail-item {
            background: rgba(255,255,255,0.5); border-radius: 12px; padding: 8px 6px;
            text-align: center; border: 1px solid rgba(255,255,255,0.5);
        }
        .detail-item i { font-size: 0.8rem; color: #0d9488; display: block; margin-bottom: 2px; }
        .detail-item .label { font-size: 0.45rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; }
        .detail-item .value { font-size: 0.8rem; font-weight: 600; color: #0f172a; }

        .astro-grid {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            gap: 8px; margin-top: 8px;
        }
        .astro-item {
            background: rgba(255,255,255,0.4); border-radius: 12px; padding: 6px 6px;
            text-align: center; border: 1px solid rgba(255,255,255,0.5);
        }
        .astro-item i { font-size: 0.8rem; color: #f59e0b; display: block; margin-bottom: 2px; }
        .astro-item .label { font-size: 0.45rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; }
        .astro-item .value { font-size: 0.75rem; font-weight: 600; color: #0f172a; }

        .loading, .error { text-align: center; padding: 20px 0; color: #94a3b8; }
        .loading i { font-size: 1.8rem; color: #0d9488; animation: spin 1s linear infinite; display: block; margin-bottom: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error { color: #ef4444; }
        .error i { font-size: 1.8rem; display: block; margin-bottom: 4px; }

        .footer {
            margin-top: 24px; text-align: center; color: #94a3b8;
            font-size: 0.65rem; font-weight: 500; border-top: 1px solid rgba(15,23,42,0.04);
            padding-top: 14px;
        }
        .footer i { color: #0d9488; margin: 0 4px; }

        @media (max-width: 850px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            .container { padding: 20px 16px; border-radius: 28px; }
            .clock-panel { padding: 24px 20px; align-items: center; text-align: center; }
            .digital-time .t { font-size: 3.4rem; }
            .digital-time .c { font-size: 3.2rem; }
            .digital-time .sec { font-size: 1.6rem; }
            .digital-time .ampm { font-size: 1.4rem; }
            .weather-temp { font-size: 2.4rem; }
        }

        @media (max-width: 500px) {
            .clock-panel { padding: 20px 16px; }
            .digital-time .t { font-size: 2.8rem; }
            .digital-time .c { font-size: 2.6rem; }
            .digital-time .sec { font-size: 1.2rem; }
            .digital-time .ampm { font-size: 1.2rem; }
            .details-grid { grid-template-columns: 1fr 1fr; }
            .astro-grid { grid-template-columns: 1fr 1fr; }
            .search-box { flex-direction: column; }
            .search-box button { padding: 10px; justify-content: center; }
            .date-info .full-date { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <div class="header-left">
            <i class="fas fa-cube"></i>
            <h1>INFO <span>CENTER</span></h1>
        </div>
        <div class="header-right">
            <span class="badge"><span class="dot"></span> Online</span>
        </div>
    </div>

    <div class="dashboard-grid">

        <!-- ===== LEFT: DIGITAL CLOCK ===== -->
        <div class="clock-panel">
            <div class="digital-time">
                <span class="t" id="hr">00</span>
                <span class="c">:</span>
                <span class="t" id="min">00</span>
                <span class="c">:</span>
                <span class="t" id="sec">00</span>
                <span class="sec" id="secSmall"></span>
                <span class="ampm" id="ampm">AM</span>
            </div>
            <div class="date-info">
                <div class="day" id="dayDisplay">MONDAY</div>
                <div class="full-date" id="dateDisplay">January 1, 2024</div>
            </div>
            <div class="tz-info" id="tzDisplay">🕒 Asia/Dhaka</div>
        </div>

        <!-- ===== RIGHT: WEATHER ===== -->
        <div class="weather-panel">
            <div class="ip-info" id="ipInfo">
                <i class="fas fa-spinner fa-spin"></i> Loading...
            </div>
            <div class="search-box">
                <input type="text" id="cityInput" placeholder="Search city (e.g. Khulna, London)" value="Dhaka">
                <button id="searchBtn"><i class="fas fa-search"></i> Search</button>
            </div>
            <div id="weatherContent">
                <div class="loading"><i class="fas fa-spinner"></i> Loading weather...</div>
            </div>
        </div>

    </div>

    <div class="footer">
        <i class="fas fa-shield-alt"></i> 2026 · <i class="fas fa-bolt" style="color:#f59e0b;"></i> Smart Dashboard · Digital Clock Only
    </div>

</div>

<script>
    // =============================================================
    //  ★★★ DIGITAL CLOCK ONLY (No Analog) ★★★
    // =============================================================
    const hrSpan = document.getElementById('hr');
    const minSpan = document.getElementById('min');
    const secSpan = document.getElementById('sec');
    const secSmall = document.getElementById('secSmall');
    const ampmSpan = document.getElementById('ampm');
    const daySpan = document.getElementById('dayDisplay');
    const dateSpan = document.getElementById('dateDisplay');
    const tzSpan = document.getElementById('tzDisplay');

    let currentTimezone = 'Asia/Dhaka';

    function getClockTime() {
        const now = new Date();
        const formatter = new Intl.DateTimeFormat('en-US', {
            timeZone: currentTimezone,
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            hour12: false
        });
        const parts = formatter.formatToParts(now);
        let h = 0, m = 0, s = 0;
        for (const p of parts) {
            if (p.type === 'hour') h = parseInt(p.value, 10);
            if (p.type === 'minute') m = parseInt(p.value, 10);
            if (p.type === 'second') s = parseInt(p.value, 10);
        }
        return { hours: h, minutes: m, seconds: s };
    }

    function updateDigitalTime(h, m, s) {
        const h12 = h % 12 || 12;
        const ampm = h >= 12 ? 'PM' : 'AM';
        hrSpan.textContent = String(h12).padStart(2, '0');
        minSpan.textContent = String(m).padStart(2, '0');
        secSpan.textContent = String(s).padStart(2, '0');
        secSmall.textContent = String(s).padStart(2, '0');
        ampmSpan.textContent = ampm;
    }

    function updateDate() {
        const now = new Date();
        const opts = { timeZone: currentTimezone, weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' };
        const full = now.toLocaleDateString('en-US', opts);
        const parts = full.split(' ');
        daySpan.textContent = parts[0].replace(',', '').toUpperCase();
        dateSpan.textContent = parts.slice(1).join(' ').replace(',', '');
        tzSpan.textContent = `🕒 ${currentTimezone}`;
    }

    function updateClock() {
        const time = getClockTime();
        updateDigitalTime(time.hours, time.minutes, time.seconds);
        updateDate();
    }

    setInterval(updateClock, 1000);
    updateClock();

    // =============================================================
    //  WEATHER + IP
    // =============================================================
    const weatherContent = document.getElementById('weatherContent');
    const cityInput = document.getElementById('cityInput');
    const searchBtn = document.getElementById('searchBtn');
    const ipInfo = document.getElementById('ipInfo');

    async function getIP() {
        try {
            const res = await fetch('https://ip-api.com/json/');
            const data = await res.json();
            if (data.status === 'success') {
                const loc = `${data.city}, ${data.regionName}, ${data.country}`;
                ipInfo.innerHTML = `<i class="fas fa-map-pin"></i> ${loc} <span class="divider">|</span> <i class="fas fa-network-wired"></i> <span class="ip">${data.query}</span>`;
                if (!cityInput.value || cityInput.value === '') {
                    cityInput.value = data.city || 'Dhaka';
                    fetchWeather(data.city || 'Dhaka');
                } else {
                    fetchWeather(cityInput.value);
                }
            } else {
                ipInfo.innerHTML = `<i class="fas fa-map-pin"></i> Unknown <span class="divider">|</span> <i class="fas fa-network-wired"></i> N/A`;
                if (!cityInput.value || cityInput.value === '') {
                    cityInput.value = 'Dhaka';
                    fetchWeather('Dhaka');
                } else {
                    fetchWeather(cityInput.value);
                }
            }
        } catch {
            ipInfo.innerHTML = `<i class="fas fa-map-pin"></i> Unknown <span class="divider">|</span> <i class="fas fa-network-wired"></i> N/A`;
            if (!cityInput.value || cityInput.value === '') {
                cityInput.value = 'Dhaka';
                fetchWeather('Dhaka');
            } else {
                fetchWeather(cityInput.value);
            }
        }
    }

    async function fetchWeather(city) {
        if (!city || city.trim() === '') {
            city = 'Dhaka';
            cityInput.value = 'Dhaka';
        }
        weatherContent.innerHTML = `<div class="loading"><i class="fas fa-spinner"></i> Fetching weather for "${city}"...</div>`;
        try {
            const url = `https://wttr.in/${encodeURIComponent(city)}?format=j1&lang=en`;
            const res = await fetch(url);
            if (!res.ok) throw new Error('API error');
            const data = await res.json();
            if (!data.current_condition || data.current_condition.length === 0) {
                throw new Error('City not found');
            }
            renderWeather(data, city);
        } catch (err) {
            weatherContent.innerHTML = `<div class="error"><i class="fas fa-exclamation-circle"></i> ${err.message}<br><small style="font-weight:400;color:#94a3b8;font-size:0.7rem;">Try "Dhaka", "Khulna", "London"</small></div>`;
        }
    }

    function renderWeather(data, city) {
        const cur = data.current_condition[0];
        const nearby = data.nearest_area ? data.nearest_area[0] : null;
        const loc = nearby ? nearby.areaName[0].value : city;

        if (data.timezone) {
            currentTimezone = data.timezone;
        }

        const temp = cur.temp_C || '--';
        const feels = cur.FeelsLikeC || cur.temp_C || '--';
        const desc = cur.weatherDesc ? cur.weatherDesc[0].value : 'Unknown';
        const code = cur.weatherCode || '113';
        const humidity = cur.humidity || '--';
        const wind = cur.windspeedKmph || '--';
        const pressure = cur.pressure || '--';
        const vis = cur.visibility || '--';
        const uv = cur.uvIndex || '--';

        let aqi = 'N/A';
        if (data.airQuality && data.airQuality.pm25) {
            aqi = data.airQuality.pm25;
        }

        let sunrise = '--', sunset = '--';
        if (data.weather && data.weather[0] && data.weather[0].astronomy && data.weather[0].astronomy[0]) {
            sunrise = data.weather[0].astronomy[0].sunrise || '--';
            sunset = data.weather[0].astronomy[0].sunset || '--';
        }

        const icons = {
            '113':'☀️','116':'⛅','119':'☁️','122':'☁️','143':'🌫️',
            '176':'🌦️','179':'🌨️','182':'🌧️','185':'🌧️','200':'⛈️',
            '227':'🌨️','230':'❄️','248':'🌫️','260':'🌫️','263':'🌦️',
            '266':'🌧️','281':'🌧️','284':'🌧️','293':'🌦️','296':'🌧️',
            '299':'🌧️','302':'🌧️','305':'🌧️','308':'🌧️','311':'🌨️',
            '314':'🌨️','317':'🌨️','320':'🌨️','323':'❄️','326':'❄️',
            '329':'❄️','332':'❄️','335':'🌨️','338':'❄️','350':'🌧️',
            '353':'🌦️','356':'🌧️','359':'🌧️','362':'🌨️','365':'🌨️',
            '368':'🌨️','371':'❄️','377':'🌨️','386':'⛈️','389':'⛈️',
            '392':'⛈️','395':'❄️'
        };
        const icon = icons[code] || '🌤️';

        weatherContent.innerHTML = `
            <div class="weather-display">
                <span class="weather-icon">${icon}</span>
                <div class="weather-temp">${temp}<sup>°C</sup></div>
                <div class="weather-desc">${desc}</div>
                <div class="weather-location"><i class="fas fa-map-pin"></i> ${loc}</div>
            </div>
            <div class="details-grid">
                <div class="detail-item"><i class="fas fa-tint"></i><div class="label">Humidity</div><div class="value">${humidity}%</div></div>
                <div class="detail-item"><i class="fas fa-wind"></i><div class="label">Wind</div><div class="value">${wind} km/h</div></div>
                <div class="detail-item"><i class="fas fa-compress-alt"></i><div class="label">Pressure</div><div class="value">${pressure} mb</div></div>
                <div class="detail-item"><i class="fas fa-eye"></i><div class="label">Visibility</div><div class="value">${vis} km</div></div>
                <div class="detail-item"><i class="fas fa-sun"></i><div class="label">UV Index</div><div class="value">${uv}</div></div>
                <div class="detail-item"><i class="fas fa-thermometer-half"></i><div class="label">Feels Like</div><div class="value">${feels}°C</div></div>
            </div>
            <div class="astro-grid">
                <div class="astro-item"><i class="fas fa-sunrise"></i><div class="label">Sunrise</div><div class="value">${sunrise}</div></div>
                <div class="astro-item"><i class="fas fa-sunset"></i><div class="label">Sunset</div><div class="value">${sunset}</div></div>
                <div class="astro-item"><i class="fas fa-leaf"></i><div class="label">AQI (PM2.5)</div><div class="value">${aqi}</div></div>
            </div>
        `;

        updateClock();
    }

    searchBtn.addEventListener('click', () => {
        const city = cityInput.value.trim();
        if (city) fetchWeather(city);
    });
    cityInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') searchBtn.click();
    });

    setInterval(() => {
        const city = cityInput.value.trim();
        if (city) fetchWeather(city);
    }, 600000);

    getIP();
</script>

</body>
</html>
